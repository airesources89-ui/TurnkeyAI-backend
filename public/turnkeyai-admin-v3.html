<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TurnkeyAI Admin Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.header{background:linear-gradient(135deg,#1e3a8a,#1e40af);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.4);}
.header h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.header h1 span{color:#34d399;}
.nav-links{display:flex;gap:12px;align-items:center;}
.nav-links a{color:rgba(255,255,255,.75);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.2);transition:all .15s;}
.nav-links a:hover{background:rgba(255,255,255,.1);color:#fff;}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:20px 24px 0;max-width:1100px;margin:0 auto;}
.stat{background:#1e293b;border-radius:10px;padding:16px;text-align:center;border:1px solid #334155;}
.stat-num{font-size:32px;font-weight:700;color:#34d399;}
.stat-label{font-size:12px;color:#94a3b8;margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.main{max-width:1100px;margin:0 auto;padding:18px 24px 60px;}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #1e293b;}
.tab{padding:10px 20px;border:none;background:none;color:#94a3b8;font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab.active{color:#60a5fa;border-bottom-color:#60a5fa;}
.tab:hover:not(.active){color:#e2e8f0;}
.panel{display:none;}
.panel.active{display:block;}
.card{background:#1e293b;border-radius:10px;padding:18px;margin-bottom:12px;border:1px solid #334155;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.biz-name{font-size:16px;font-weight:700;color:#f1f5f9;}
.biz-meta{font-size:12px;color:#64748b;margin-top:3px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.badge-pending{background:#fef3c7;color:#92400e;}
.badge-review{background:#dbeafe;color:#1e40af;}
.badge-active{background:#d1fae5;color:#065f46;}
.badge-trial{background:#fce7f3;color:#9d174d;}
.badge-declined{background:#fee2e2;color:#991b1b;}
.detail-row{font-size:12px;color:#94a3b8;margin-top:6px;}
.detail-row b{color:#cbd5e1;}
.partner-tag{display:inline-block;background:#1e1b4b;color:#a5b4fc;font-size:11px;padding:2px 8px;border-radius:10px;margin-top:4px;}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid #334155;}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-approve{background:#10B981;color:#fff;}
.btn-approve:hover:not(:disabled){background:#059669;}
.btn-changes{background:#f59e0b;color:#fff;}
.btn-changes:hover:not(:disabled){background:#d97706;}
.btn-resend{background:#6366f1;color:#fff;}
.btn-resend:hover:not(:disabled){background:#4f46e5;}
.btn-decline{background:#ef4444;color:#fff;}
.btn-decline:hover:not(:disabled){background:#dc2626;}
.btn-secondary{background:#334155;color:#e2e8f0;}
.btn-secondary:hover:not(:disabled){background:#475569;}
.empty{text-align:center;color:#475569;padding:60px;font-size:14px;}
.loading{text-align:center;color:#64748b;padding:40px;font-size:14px;}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:10px;font-weight:600;z-index:999;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:all .3s;opacity:0;transform:translateY(10px);}
.toast.show{opacity:1;transform:translateY(0);}
.toast-success{background:#10B981;color:#fff;}
.toast-error{background:#ef4444;color:#fff;}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#1e293b;border-radius:14px;padding:24px;max-width:500px;width:92%;border:1px solid #334155;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;color:#f1f5f9;}
.modal label{display:block;font-size:12px;color:#94a3b8;margin:12px 0 5px;}
.modal input,.modal textarea,.modal select{width:100%;padding:9px 12px;background:#0f172a;border:1px solid #334155;border-radius:7px;color:#e2e8f0;font-size:13px;font-family:inherit;}
.modal textarea{min-height:80px;resize:vertical;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.refresh-btn{float:right;font-size:12px;color:#60a5fa;background:none;border:none;cursor:pointer;padding:4px 8px;}
.refresh-btn:hover{color:#93c5fd;}
</style>
</head>
<body>

<div class="header">
  <h1>TurnkeyAI<span>Admin</span></h1>
  <div class="nav-links">
    <a href="/intake.html" target="_blank">+ New Client Intake</a>
    <a href="/" target="_blank">Server Status</a>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-num" id="statPending">—</div><div class="stat-label">Pending Build</div></div>
  <div class="stat"><div class="stat-num" id="statReview">—</div><div class="stat-label">Awaiting Review</div></div>
  <div class="stat"><div class="stat-num" id="statActive">—</div><div class="stat-label">Active Clients</div></div>
  <div class="stat"><div class="stat-num" id="statPartners">—</div><div class="stat-label">Active Partners</div></div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'clients')">📋 Client Submissions</button>
    <button class="tab" onclick="switchTab(this,'partners')">🤝 Territory Partners</button>
  </div>

  <div class="panel active" id="panel-clients">
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    <div id="clientsList"><div class="loading">Loading submissions...</div></div>
  </div>

  <div class="panel" id="panel-partners">
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    <div id="partnersList"><div class="loading">Loading partner applications...</div></div>
  </div>
</div>

<!-- CHANGE REQUEST MODAL -->
<div class="modal-bg" id="changeModal">
  <div class="modal">
    <h3>✏️ Request Changes</h3>
    <label>What needs to change?</label>
    <select id="changeType">
      <option value="business_info">Business Info (name, address, phone)</option>
      <option value="services">Services or Pricing</option>
      <option value="photos">Photos / Logo</option>
      <option value="content">Website Content / Text</option>
      <option value="other">Other</option>
    </select>
    <label>Current (wrong) info:</label>
    <input type="text" id="changeCurrentInfo" placeholder="What it shows now">
    <label>Should be:</label>
    <input type="text" id="changeCorrectedInfo" placeholder="What it should say">
    <label>Additional notes:</label>
    <textarea id="changeNotes" placeholder="Any other details..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('changeModal')">Cancel</button>
      <button class="btn btn-changes" onclick="submitChangeRequest()">Send Change Request</button>
    </div>
  </div>
</div>

<!-- PARTNER MODIFY MODAL -->
<div class="modal-bg" id="partnerModifyModal">
  <div class="modal">
    <h3>✏️ Approve with Modifications</h3>
    <label>Approved ZIP Codes (comma separated):</label>
    <input type="text" id="approvedZips" placeholder="e.g. 39520, 39521, 39522">
    <label>Notes for partner:</label>
    <textarea id="modifyNotes" placeholder="Explain any territory restrictions..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('partnerModifyModal')">Cancel</button>
      <button class="btn btn-approve" onclick="submitPartnerModify()">Send Approval</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';  // same origin

var allSubmissions = [];
var allPartners = [];
var _currentChangeId = null;
var _currentPartnerId = null;

async function loadAll() {
  try {
    const [subRes, partRes] = await Promise.all([
      fetch(API + '/api/submissions'),
      fetch(API + '/api/partners')
    ]);
    allSubmissions = await subRes.json();
    allPartners = await partRes.json();
    renderClients();
    renderPartners();
    updateStats();
  } catch(e) {
    document.getElementById('clientsList').innerHTML = '<div class="empty">⚠️ Could not load data. Is the server running?<br><small>' + e.message + '</small></div>';
  }
}

function updateStats() {
  document.getElementById('statPending').textContent = allSubmissions.filter(s=>s.status==='pending').length;
  document.getElementById('statReview').textContent = allSubmissions.filter(s=>s.status==='review').length;
  document.getElementById('statActive').textContent = allSubmissions.filter(s=>s.status==='active').length;
  document.getElementById('statPartners').textContent = allPartners.filter(p=>p.status==='active').length;
}

function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch(e) { return iso; }
}

function renderClients() {
  const el = document.getElementById('clientsList');
  if (!allSubmissions.length) {
    el.innerHTML = '<div class="empty">No submissions yet.<br>They appear here automatically when clients complete the intake form.</div>';
    return;
  }
  el.innerHTML = allSubmissions.map(s => {
    const badge = {pending:'<span class="badge badge-pending">Pending Build</span>',review:'<span class="badge badge-review">Awaiting Review</span>',active:'<span class="badge badge-active">✓ Active</span>',trial:'<span class="badge badge-trial">Trial</span>'}[s.status] || '<span class="badge badge-pending">'+s.status+'</span>';
    const partnerTag = s.operator_ref ? '<span class="partner-tag">🤝 Partner: '+s.operator_ref+'</span>' : '';
    const previewBtn = s.previewSite ? '<a href="https://'+s.previewSite+'.pages.dev" target="_blank" class="btn btn-secondary">👁 Preview Site</a>' : '';
    const approveBtn = (s.status==='review'||s.status==='trial') ? '<button class="btn btn-approve" onclick="clientApprove(\''+s.id+'\',this)">✓ Approve & Go Live</button>' : '';
    const changesBtn = s.status==='review' ? '<button class="btn btn-changes" onclick="openChangeModal(\''+s.id+'\')">✏ Request Changes</button>' : '';
    const resendBtn = s.status==='review' ? '<button class="btn btn-resend" onclick="clientResend(\''+s.id+'\',this)">📧 Resend Review Email</button>' : '';
    const buildBtn = s.status==='pending' ? '<button class="btn btn-approve" onclick="markBuilt(\''+s.id+'\',this)">🚀 Mark as Built</button>' : '';
    return '<div class="card" id="card-'+s.id+'"><div class="card-top"><div><div class="biz-name">'+s.businessName+'</div><div class="biz-meta">'+s.ownerName+' &bull; '+(s.city?s.city+', ':'')+s.state+' &bull; '+(s.industry||'')+(s.submittedAt?' &bull; '+fmtDate(s.submittedAt):'')+'</div>'+partnerTag+'</div>'+badge+'</div>'+
      '<div class="detail-row"><b>Email:</b> '+s.email+' &nbsp;|&nbsp; <b>Phone:</b> '+s.phone+'</div>'+
      '<div class="actions">'+previewBtn+approveBtn+changesBtn+resendBtn+buildBtn+'</div></div>';
  }).join('');
}

function renderPartners() {
  const el = document.getElementById('partnersList');
  if (!allPartners.length) {
    el.innerHTML = '<div class="empty">No partner applications yet.</div>';
    return;
  }
  el.innerHTML = allPartners.map(p => {
    const badge = {pending:'<span class="badge badge-pending">Pending</span>',active:'<span class="badge badge-active">✓ Active</span>',declined:'<span class="badge badge-declined">Declined</span>'}[p.status] || '<span class="badge badge-pending">'+p.status+'</span>';
    const tierBadge = '<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:#1e40af;color:#fff;margin-left:8px;">'+(p.tier||'').toUpperCase()+'</span>';
    const approveBtn = p.status==='pending' ? '<button class="btn btn-approve" onclick="partnerApprove(\''+p.id+'\',this)">✓ Approve</button>' : '';
    const modifyBtn = p.status==='pending' ? '<button class="btn btn-changes" onclick="openPartnerModifyModal(\''+p.id+'\')">✏ Approve w/ Mods</button>' : '';
    const declineBtn = p.status==='pending' ? '<button class="btn btn-decline" onclick="partnerDecline(\''+p.id+'\',this)">✗ Decline</button>' : '';
    return '<div class="card" id="pcard-'+p.id+'"><div class="card-top"><div><div class="biz-name">'+p.name+tierBadge+'</div><div class="biz-meta">'+p.territory+' &bull; Applied '+fmtDate(p.appliedAt)+'</div></div>'+badge+'</div>'+
      '<div class="detail-row"><b>Email:</b> '+p.email+' &nbsp;|&nbsp; <b>Phone:</b> '+p.phone+' &nbsp;|&nbsp; <b>ZIPs:</b> '+p.zipCodes+'</div>'+
      '<div class="actions">'+approveBtn+modifyBtn+declineBtn+'</div></div>';
  }).join('');
}

// CLIENT ACTIONS
async function clientApprove(id, btn) {
  const s = allSubmissions.find(x=>x.id===id);
  if (!s) return;
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    await fetch(API+'/api/client-review-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'approve',previewSite:s.previewSite||'',finalSite:s.id,email:s.email,businessName:s.businessName,ownerName:s.ownerName})});
    await fetch(API+'/api/update-submission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'active'})});
    s.status='active';
    showToast('✓ '+s.businessName+' approved — email sent to George', 'success');
    renderClients(); updateStats();
  } catch(e) { btn.disabled=false; btn.textContent='✓ Approve & Go Live'; showToast('Error: '+e.message,'error'); }
}

async function clientResend(id, btn) {
  const s = allSubmissions.find(x=>x.id===id);
  if (!s) return;
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    await fetch(API+'/api/client-review-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'resend-review',previewSite:s.previewSite||'',finalSite:s.id,email:s.email,businessName:s.businessName,ownerName:s.ownerName})});
    showToast('📧 Review email resent to '+s.email,'success');
  } catch(e) { showToast('Error: '+e.message,'error'); }
  btn.disabled=false; btn.textContent='📧 Resend Review Email';
}

async function markBuilt(id, btn) {
  const s = allSubmissions.find(x=>x.id===id);
  if (!s) return;
  btn.disabled=true; btn.textContent='Updating...';
  await fetch(API+'/api/update-submission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'review'})});
  s.status='review';
  showToast('🚀 '+s.businessName+' marked as built — now in Awaiting Review','success');
  renderClients(); updateStats();
}

function openChangeModal(id) { _currentChangeId=id; document.getElementById('changeModal').classList.add('open'); }
async function submitChangeRequest() {
  const s = allSubmissions.find(x=>x.id===_currentChangeId);
  if (!s) return;
  try {
    await fetch(API+'/api/client-review-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      action:'changes',previewSite:s.previewSite||'',finalSite:s.id,email:s.email,businessName:s.businessName,ownerName:s.ownerName,
      changeType:document.getElementById('changeType').value,
      currentInfo:document.getElementById('changeCurrentInfo').value,
      correctedInfo:document.getElementById('changeCorrectedInfo').value,
      additionalNotes:document.getElementById('changeNotes').value
    })});
    closeModal('changeModal');
    showToast('✏ Change request sent for '+s.businessName,'success');
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

// PARTNER ACTIONS
async function partnerApprove(id, btn) {
  const p = allPartners.find(x=>x.id===id);
  if (!p) return;
  btn.disabled=true; btn.textContent='Sending...';
  try {
    await fetch(API+'/api/partner-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'approve',partner:p})});
    await fetch(API+'/api/update-partner',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'active'})});
    p.status='active';
    showToast('✓ '+p.name+' approved — email sent','success');
    renderPartners(); updateStats();
  } catch(e) { btn.disabled=false; btn.textContent='✓ Approve'; showToast('Error: '+e.message,'error'); }
}

async function partnerDecline(id, btn) {
  const p = allPartners.find(x=>x.id===id);
  if (!p || !confirm('Decline '+p.name+'?')) return;
  btn.disabled=true;
  await fetch(API+'/api/partner-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'decline',partner:p})});
  await fetch(API+'/api/update-partner',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'declined'})});
  p.status='declined';
  showToast('✗ '+p.name+' declined','success');
  renderPartners(); updateStats();
}

function openPartnerModifyModal(id) { _currentPartnerId=id; document.getElementById('partnerModifyModal').classList.add('open'); }
async function submitPartnerModify() {
  const p = allPartners.find(x=>x.id===_currentPartnerId);
  if (!p) return;
  p.approvedZips = document.getElementById('approvedZips').value;
  await fetch(API+'/api/partner-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'modify',partner:p})});
  await fetch(API+'/api/update-partner',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:p.id,status:'active',approvedZips:p.approvedZips})});
  p.status='active';
  closeModal('partnerModifyModal');
  showToast('✓ '+p.name+' approved with modifications','success');
  renderPartners(); updateStats();
}

function switchTab(btn, name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-'+(type||'success');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

// Auto-refresh every 60 seconds
setInterval(loadAll, 60000);
loadAll();
</script>
</body>
</html>
