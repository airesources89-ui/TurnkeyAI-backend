<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurnkeyAI Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#0f172a;min-height:100vh;color:#e2e8f0;}
.header{background:#1e293b;border-bottom:1px solid #334155;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:20px;font-weight:700;color:white;}.logo span{color:#00D68F;}
.admin-badge{background:rgba(0,214,143,.15);border:1px solid #00D68F;color:#00D68F;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.container{max-width:1100px;margin:0 auto;padding:32px 24px;}

#loginScreen{max-width:400px;margin:80px auto;background:#1e293b;border-radius:16px;padding:40px;border:1px solid #334155;}
#loginScreen h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;}
#loginScreen p{color:#94a3b8;font-size:14px;margin-bottom:28px;}
input[type="password"]{width:100%;padding:12px 16px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:white;font-size:15px;margin-bottom:12px;}
input[type="password"]:focus{outline:none;border-color:#0066FF;}
.btn{padding:12px 24px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#0066FF,#0052CC);color:white;width:100%;}
.btn-approve{background:linear-gradient(135deg,#00D68F,#00b377);color:white;padding:8px 16px;font-size:13px;}
.btn-preview{background:rgba(0,102,255,.15);border:1px solid #0066FF;color:#60a5fa;padding:8px 16px;font-size:13px;cursor:pointer;}
.btn-sm{padding:6px 14px;font-size:13px;}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px;}
.stat{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;}
.stat .number{font-size:36px;font-weight:700;color:#00D68F;}
.stat .label{color:#94a3b8;font-size:14px;margin-top:4px;}

.section-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.refresh-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;}
.refresh-btn:hover{border-color:#0066FF;color:#60a5fa;}

.clients-list{display:grid;gap:16px;}
.client-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;}
.client-card.active{border-color:#00D68F;}
.client-card.pending{border-color:#f59e0b;}
.client-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.client-header h3{font-size:18px;font-weight:700;}
.status-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.status-pill.pending{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid #f59e0b;}
.status-pill.active{background:rgba(0,214,143,.15);color:#00D68F;border:1px solid #00D68F;}
.client-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:16px;}
.meta-item .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;}
.meta-item .value{font-size:14px;color:#e2e8f0;font-weight:500;}
.client-actions{display:flex;gap:10px;flex-wrap:wrap;}

.empty-state{text-align:center;padding:60px 24px;color:#64748b;}
.empty-state .icon{font-size:48px;margin-bottom:16px;}

.toast{position:fixed;bottom:24px;right:24px;background:#00D68F;color:white;padding:14px 20px;border-radius:10px;font-weight:600;font-size:14px;display:none;z-index:999;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">TurnkeyAI<span>Services</span> <span style="font-size:14px;font-weight:400;color:#94a3b8;margin-left:8px;">Admin</span></div>
  <span class="admin-badge">ADMIN PANEL</span>
</div>

<div class="container">

  <!-- LOGIN -->
  <div id="loginScreen">
    <h2>Admin Login</h2>
    <p>Enter your admin key to access the dashboard.</p>
    <input type="password" id="adminKeyInput" placeholder="Admin key" onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button class="btn btn-primary" onclick="doAdminLogin()">Access Dashboard</button>
    <p id="loginErr" style="color:#f87171;font-size:13px;margin-top:10px;display:none;">Incorrect key. Try again.</p>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="adminDash" style="display:none;">
    <div class="stats">
      <div class="stat"><div class="number" id="statTotal">0</div><div class="label">Total Clients</div></div>
      <div class="stat"><div class="number" id="statPending" style="color:#f59e0b;">0</div><div class="label">Pending Approval</div></div>
      <div class="stat"><div class="number" id="statActive">0</div><div class="label">Active Sites</div></div>
    </div>

    <div class="section-title">
      All Clients
      <button class="refresh-btn" onclick="loadClients()">↻ Refresh</button>
    </div>
    <div class="clients-list" id="clientsList">
      <div class="empty-state"><div class="icon">📋</div><p>Loading clients...</p></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const BACKEND = 'https://turnkeyai-backend-production.up.railway.app';
let adminKey = '';

function doAdminLogin() {
  const key = document.getElementById('adminKeyInput').value.trim();
  if (!key) return;
  adminKey = key;
  loadClients();
}

async function loadClients() {
  try {
    const r = await fetch(`${BACKEND}/api/admin/clients?adminKey=${encodeURIComponent(adminKey)}`);
    if (r.status === 403) {
      document.getElementById('loginErr').style.display = 'block';
      return;
    }
    const clients = await r.json();
    document.getElementById('loginErr').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminDash').style.display = 'block';
    renderClients(clients);
  } catch(e) {
    alert('Could not connect to backend. Is Railway running?');
  }
}

function renderClients(clients) {
  document.getElementById('statTotal').textContent = clients.length;
  document.getElementById('statPending').textContent = clients.filter(c => c.status === 'pending').length;
  document.getElementById('statActive').textContent = clients.filter(c => c.status === 'active').length;

  if (!clients.length) {
    document.getElementById('clientsList').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No clients yet. They\'ll appear here when someone submits the intake form.</p></div>';
    return;
  }

  // Sort: pending first, then by date
  clients.sort((a, b) => {
    if (a.status === 'pending' && b.status !== 'pending') return -1;
    if (a.status !== 'pending' && b.status === 'pending') return 1;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  let html = '';
  clients.forEach(c => {
    const date = c.createdAt ? new Date(c.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    const previewUrl = `https://turnkeyaiservices.com/preview/${c.previewToken}`;
    const approveUrl = `${BACKEND}/api/approve/${c.id}?adminKey=${encodeURIComponent(adminKey)}`;
    html += `
      <div class="client-card ${c.status}">
        <div class="client-header">
          <h3>${c.businessName || 'Unnamed Business'}</h3>
          <span class="status-pill ${c.status}">${c.status === 'active' ? '✅ Active' : '⏳ Pending'}</span>
        </div>
        <div class="client-meta">
          <div class="meta-item"><div class="label">Owner</div><div class="value">${c.ownerName || '—'}</div></div>
          <div class="meta-item"><div class="label">Email</div><div class="value">${c.email || '—'}</div></div>
          <div class="meta-item"><div class="label">Phone</div><div class="value">${c.phone || '—'}</div></div>
          <div class="meta-item"><div class="label">Industry</div><div class="value">${(c.industry || '').replace(/_/g,' ')}</div></div>
          <div class="meta-item"><div class="label">City</div><div class="value">${c.city || '—'}</div></div>
          <div class="meta-item"><div class="label">Submitted</div><div class="value">${date}</div></div>
        </div>
        <div class="client-actions">
          <a href="${previewUrl}" target="_blank"><button class="btn btn-preview">👁️ View Preview</button></a>
          ${c.liveUrl ? `<a href="${c.liveUrl}" target="_blank"><button class="btn btn-approve" style="background:linear-gradient(135deg,#0066FF,#0052CC);">🌐 View Live Site</button></a>` : ''}
          ${c.status === 'pending' ? `<a href="${approveUrl}" target="_blank"><button class="btn btn-approve" onclick="showToast('Deploying ${c.businessName}...')">✅ Approve &amp; Deploy Live</button></a>` : `<span style="color:#00D68F;font-size:13px;font-weight:600;">✅ Live — credentials sent</span>`}
        </div>
      </div>`;
  });
  document.getElementById('clientsList').innerHTML = html;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}
</script>
</body>
</html>
